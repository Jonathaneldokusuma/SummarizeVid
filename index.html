<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SummarizeVid</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; background: linear-gradient(135deg, #101828, #1d4ed8); color: white; display: grid; place-items: center; }
    .card { width: min(720px, calc(100vw - 32px)); background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 24px; box-shadow: 0 20px 80px rgba(0,0,0,0.25); }
    input, button, textarea { width: 100%; box-sizing: border-box; border-radius: 12px; border: 0; padding: 14px; font-size: 16px; }
    input, textarea { margin: 10px 0; }
    input, textarea { background: rgba(255,255,255,0.95); color: #111827; }
    button { background: #22c55e; color: white; font-weight: 700; cursor: pointer; }
    pre { white-space: pre-wrap; background: rgba(15,23,42,0.8); padding: 16px; border-radius: 12px; overflow: auto; }
    .muted { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>
  <div class="card">
    <h1>SummarizeVid</h1>
    <p class="muted">Paste a public or listed YouTube URL and get a transcript-based summary.</p>
    <input id="video" placeholder="https://www.youtube.com/watch?v=..." />
    <button id="go">Summarize</button>
    <pre id="out">Waiting for a video link...</pre>
  </div>
  <script>
    const out = document.getElementById('out');
    document.getElementById('go').onclick = async () => {
      const video = document.getElementById('video').value.trim();
      if (!video) return out.textContent = 'Paste a YouTube link first.';
      out.textContent = 'Loading...';
      const res = await fetch(`/api/summarize?video=${encodeURIComponent(video)}&limit=6`);
      const data = await res.json();
      out.textContent = res.ok
        ? `${data.summary}\n\nHighlights:\n- ${data.highlights.join('\n- ')}`
        : `Error: ${data.error}`;
    };
  </script>
</body>
</html>
